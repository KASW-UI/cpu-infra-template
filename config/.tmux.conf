# ── tmux configuration ─────────────────────────────────────────────────────────

set-option -g default-terminal "screen-256color"
set-option -g mouse on
set-option -g history-limit 50000

# split panes using vim-style bindings
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# reload config
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# sane window indexing
set-option -g base-index 1
setw-option -g pane-base-index 1

# vi-mode in copy mode
setw-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# status bar
set-option -g status-position bottom
set-option -g status-style bg=colour236,fg=colour250
set-option -g status-left '#[fg=colour39]#S '
set-option -g status-right '#[fg=colour243]%Y-%m-%d %H:%M '

# GPU status (if nvidia-smi is available)
if-shell 'command -v nvidia-smi > /dev/null' \
    'set-option -g status-right "#[fg=colour76]#(nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader | head -1) #[fg=colour243]%Y-%m-%d %H:%M "' \
    'set-option -g status-right "#[fg=colour243]%Y-%m-%d %H:%M "'

# true color support
set-option -ga terminal-overrides ",xterm-256color:Tc"
