name: Build and Publish

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /opt/hostedtoolcache /usr/local/.ghcup
          sudo docker system prune -af 2>/dev/null || true
          df -h /

      - name: Read versions
        id: versions
        run: |
          grep -v '^#' env/versions.env | grep -v '^$' >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        run: |
          echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Generate image tags
        id: tags
        run: |
          VERSION_TAG="cuda${{ steps.versions.outputs.CUDA_VERSION }}-torch${{ steps.versions.outputs.TORCH_VERSION }}"
          SHA_TAG="sha-${GITHUB_SHA::8}"
          echo "version=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CUDA_VERSION=${{ steps.versions.outputs.CUDA_VERSION }}
            PYTHON_VERSION=${{ steps.versions.outputs.PYTHON_VERSION }}
            TORCH_VERSION=${{ steps.versions.outputs.TORCH_VERSION }}
            TRITON_VERSION=${{ steps.versions.outputs.TRITON_VERSION }}
            UBUNTU_VERSION=${{ steps.versions.outputs.UBUNTU_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }}

      - name: Smoke test — container starts
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash -c "echo 'Container OK'; python3 --version; uname -a"

      - name: Smoke test — Python imports
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash -c "
              python3 -c 'import torch; assert torch.__version__ == \"${{ steps.versions.outputs.TORCH_VERSION }}\"'
              python3 -c 'import triton; print(triton.__version__)'
              python3 -c 'import numpy; print(numpy.__version__)'
            "

      - name: Smoke test — verify.sh (dry-run)
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash /workspace/scripts/verify.sh || true

      - name: Push to registry
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CUDA_VERSION=${{ steps.versions.outputs.CUDA_VERSION }}
            PYTHON_VERSION=${{ steps.versions.outputs.PYTHON_VERSION }}
            TORCH_VERSION=${{ steps.versions.outputs.TORCH_VERSION }}
            TRITON_VERSION=${{ steps.versions.outputs.TRITON_VERSION }}
            UBUNTU_VERSION=${{ steps.versions.outputs.UBUNTU_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }}
