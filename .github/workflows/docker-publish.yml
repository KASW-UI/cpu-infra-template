name: Build and Publish

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /opt/hostedtoolcache /usr/local/.ghcup
          sudo docker system prune -af 2>/dev/null || true
          df -h /

      - name: Read versions
        id: versions
        run: |
          grep -v '^#' env/versions.env | grep -v '^$' >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        run: |
          echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Generate image tags
        id: tags
        run: |
          VERSION_TAG="cpu-hpc-ubuntu${{ steps.versions.outputs.UBUNTU_VERSION }}"
          SHA_TAG="sha-${GITHUB_SHA::8}"
          echo "version=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            UBUNTU_VERSION=${{ steps.versions.outputs.UBUNTU_VERSION }}
            PYTHON_VERSION=${{ steps.versions.outputs.PYTHON_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }}

      - name: Smoke test — container starts
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash -c "echo 'Container OK'; python3 --version; gcc --version | head -1; cmake --version | head -1"

      - name: Smoke test — compilers
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash -c "
              gcc --version | head -1
              g++ --version | head -1
              clang --version | head -1
              echo 'Compilers OK'
            "

      - name: Smoke test — OpenMP
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash -c "
              cat > /tmp/omp_test.cpp << 'EOF'
#include <omp.h>
#include <cstdio>
int main() {
    #pragma omp parallel
    {
        #pragma omp single
        printf(\"Threads: %d\n\", omp_get_num_threads());
    }
    return 0;
}
EOF
              g++ -fopenmp /tmp/omp_test.cpp -o /tmp/omp_test
              /tmp/omp_test
            "

      - name: Smoke test — MPI
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash -c "
              mpirun --version | head -1
              mpirun --allow-run-as-root -np 2 /bin/true
              echo 'MPI OK'
            "

      - name: Smoke test — Python imports
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }} \
            bash -c "
              python3 -c 'import numpy; print(numpy.__version__)'
              python3 -c 'import scipy; print(scipy.__version__)'
              python3 -c 'import pandas; print(pandas.__version__)'
            "

      - name: Push to registry
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            UBUNTU_VERSION=${{ steps.versions.outputs.UBUNTU_VERSION }}
            PYTHON_VERSION=${{ steps.versions.outputs.PYTHON_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ steps.tags.outputs.sha }}
