services:
  cpu-dev:
    image: ${IMAGE_NAME:-cpu-infra-template}:${IMAGE_TAG:-cpu-hpc-ubuntu22.04}
    container_name: cpu-infra-dev
    env_file:
      - ../../configs/openmp.env
      - ../../configs/mpi.env
      - ../../configs/hpc.env
    shm_size: 4gb
    ulimits:
      memlock: -1
      stack: 67108864
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - ../../src:/workspace/src
      - ../../scripts:/workspace/scripts
      - ../../runtime/logs:/workspace/logs
      - ../../runtime/snapshots:/workspace/snapshots
      - ~/.ssh:/home/dev/.ssh:ro
      - ~/.gitconfig:/home/dev/.gitconfig:ro
      - ~/.tmux.conf:/home/dev/.tmux.conf:ro
    stdin_open: true
    tty: true
    user: "1000:1000"
